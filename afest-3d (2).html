for (let i = 0; i < 3000 * 3; i++) sPos[i] = (Math.random() - 0.5) * 80;
starGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 })));

// ── Load logo texture ──
const loader = new THREE.TextureLoader();
const logoTex = loader.load(LOGO_B64);

// ── Spinning globe with LOGO texture ──
const globeGeo = new THREE.SphereGeometry(1.8, 64, 64);
const globeMat = new THREE.MeshPhongMaterial({
  map: logoTex,
  shininess: 40,
  specular: new THREE.Color(0x331122),
});
const globe = new THREE.Mesh(globeGeo, globeMat);

const group = new THREE.Group();
scene.add(group);
group.add(globe);

// ── Atmosphere glow ──
const atmMat = new THREE.MeshPhongMaterial({
  color: 0xff1493, transparent: true, opacity: 0.08, side: THREE.BackSide
});
group.add(new THREE.Mesh(new THREE.SphereGeometry(1.9, 64, 64), atmMat));

// ── Outer glow ring ──
const glowMat = new THREE.MeshPhongMaterial({
  color: 0xff1493, transparent: true, opacity: 0.04, side: THREE.BackSide
});
group.add(new THREE.Mesh(new THREE.SphereGeometry(2.05, 64, 64), glowMat));

// ── Orbit particles ──
function makeOrbit(count, radius, color, tilt) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const a = (i / count) * Math.PI * 2;
    const r = radius + Math.sin(i * 0.7) * 0.12;
    pos[i*3]   = Math.cos(a) * r;
    pos[i*3+1] = (Math.random() - 0.5) * 0.2;
    pos[i*3+2] = Math.sin(a) * r;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const ring = new THREE.Points(geo, new THREE.PointsMaterial({ color, size: 0.045, transparent: true, opacity: 0.75 }));
  ring.rotation.x = tilt;
  return ring;
}

const ring1 = makeOrbit(150, 2.4, 0xff1493, 0.3);
const ring2 = makeOrbit(120, 2.25, 0x00bfff, -0.2);
const ring3 = makeOrbit(80, 2.55, 0xff69b4, 1.1);
scene.add(ring1);
scene.add(ring2);
scene.add(ring3);

// ── Lights ──
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0xffffff, 1.0);
key.position.set(4, 5, 6);
scene.add(key);
const pink = new THREE.PointLight(0xff1493, 3.5, 10);
pink.position.set(-3, 2, 3);
scene.add(pink);
const cyan = new THREE.PointLight(0x00bfff, 2.0, 10);
cyan.position.set(3, -2, 2);
scene.add(cyan);
const rim = new THREE.DirectionalLight(0xff69b4, 0.6);
rim.position.set(-4, -3, -4);
scene.add(rim);

// ── Mouse ──
let tx = 0, ty = 0;
document.addEventListener('mousemove', e => {
  tx = (e.clientX / innerWidth - 0.5) * 1.0;
  ty = -(e.clientY / innerHeight - 0.5) * 1.0;
});

// ── Animate ──
let clock = 0, introScale = 0;
setTimeout(() => {
  const l = document.getElementById('loader');
  l.style.opacity = '0';
  setTimeout(() => l.remove(), 800);
}, 600);

function animate() {
  requestAnimationFrame(animate);
  clock += 0.01;

  if (introScale < 1) {
    introScale = Math.min(introScale + 0.012, 1);
    const ease = 1 - Math.pow(1 - introScale, 3);
    group.scale.setScalar(ease);
  }

  group.rotation.y += (tx - group.rotation.y) * 0.04;
  group.rotation.x += (ty - group.rotation.x) * 0.04;
  group.rotation.y += 0.003;
  group.position.y = Math.sin(clock * 0.6) * 0.07;

  globe.rotation.y += 0.004;

  ring1.rotation.y = clock * 0.35;
  ring2.rotation.y = -clock * 0.28;
  ring3.rotation.y = clock * 0.18;
  ring3.rotation.x = 1.1 + Math.sin(clock * 0.3) * 0.15;

  pink.intensity = 3.0 + Math.sin(clock * 1.9) * 0.9;
  cyan.intensity = 1.8 + Math.cos(clock * 2.3) * 0.6;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
